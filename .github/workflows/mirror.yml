name: Mirror to Codeberg

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Codeberg
        run: |
          git remote add codeberg https://sleuthy-sloth:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/sleuthy-sloth/f1-cli.git
          git push codeberg main --force
